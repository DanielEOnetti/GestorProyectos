<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sesión</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #0056b3; }
        .error { color: red; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Bienvenido</h2>
        <p>Ingresa tus credenciales para gestionar proyectos</p>
        
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <p class="error">Usuario o contraseña incorrectos.</p>
            {% endif %}
            
            <input type="text" name="username" placeholder="Usuario" required autofocus>
            <input type="password" name="password" placeholder="Contraseña" required>
            
            <button type="submit">Entrar</button>
        </form>
        <p style="margin-top: 20px;">
    ¿No tienes cuenta? <a href="{% url 'signup' %}">Regístrate aquí</a>
</p>
    </div>
</body>
</html>
