<!DOCTYPE html>
<html>
<head>
    <title>Registrarse</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px;}
        button:hover { background: #218838; }
        .helptext { font-size: 0.8em; color: #666; display: block; margin-bottom: 5px; text-align: left; margin-left: 5%; }
        ul { list-style: none; padding: 0; color: red; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Crear Cuenta</h2>
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div style="margin-bottom: 10px;">
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" placeholder="{{ field.label }}" required>
                    {% if field.help_text %}
                        <small class="helptext">{{ field.help_text }}</small>
                    {% endif %}
                    {% for error in field.errors %}
                        <div style="color: red; font-size: 0.8em;">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit">Registrarme</button>
        </form>
        <p style="margin-top: 20px;">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
        </p>
    </div>
</body>
</html>
