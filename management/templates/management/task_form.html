<!DOCTYPE html>
<html>
<head>
    <title>Gestionar Tarea</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 8px; max-width: 500px; margin: 0 auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;}
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-cancel { color: #666; text-decoration: none; margin-left: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{% if form.instance.pk %}Editar Tarea{% else %}Nueva Tarea{% endif %}</h1>
        <form method="post">
            {% csrf_token %}
            
            <label>Título:</label>
            {{ form.title }}
            
            <label>Asignar a:</label>
            {{ form.assigned_to }}
            
            <label>Estado:</label>
            {{ form.status }}
            
            <br><br>
            <button type="submit">Guardar</button>
            <a href="javascript:history.back()" class="btn-cancel">Cancelar</a>
        </form>
    </div>
</body>
</html>
